<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiaCode v2.0</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --whatsapp: #25d366;
            --danger: #ff4444;
            --accent: #00d4ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1; 
            pointer-events: none;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        header { text-align: center; margin-bottom: 25px; }
        header h1 { color: var(--primary); font-size: 28px; margin: 0; }
        header h1 span { font-size: 14px; background: var(--primary); color: #000; padding: 2px 8px; border-radius: 5px; vertical-align: middle; }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 18px; }

        .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }

        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        label { font-size: 12px; color: #888; }

        input, select {
            background: #111;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        button, .btn-link {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-sizing: border-box;
            font-size: 14px;
            transition: 0.3s;
        }

        button:active { transform: scale(0.98); }

        .btn-whatsapp { background: var(--whatsapp); color: white; }
        .btn-emergency { background: var(--danger); color: white; }
        .btn-pharmacy { background: transparent; border: 1px solid var(--primary); color: var(--primary); }

        .result-box {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            text-align: center;
            font-weight: bold;
        }

        .table-wrapper { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #333; }
        th { color: var(--primary); }

        .app-footer { text-align: center; font-size: 11px; color: #555; padding: 20px 0; }
        .insta-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; text-decoration: none; display: flex; padding: 12px; border-radius: 10px; margin-top: 15px; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
    <header>
        <h1>DiaCode <span>v2.0</span></h1>
        <p>نظام ذكي لمتابعة وتشفير البيانات الصحية</p>
    </header>

    <div class="card">
        <h3>👤 الملف الطبي للمريض</h3>
        <div class="profile-grid">
            <div class="input-group full-width">
                <label>الاسم الكامل</label>
                <input type="text" id="patientName" placeholder="علي أحمد...">
            </div>
            <div class="input-group">
                <label>السكر التراكمي (HbA1c)</label>
                <input type="number" id="hba1c" step="0.1" placeholder="6">
            </div>
            <div class="input-group">
                <label>الوزن (كجم)</label>
                <input type="number" id="weight" placeholder="80">
            </div>
            <div class="input-group full-width">
                <label>رقم واتساب الطبيب (للمراسلة والطوارئ)</label>
                <input type="text" id="docPhone" placeholder="077XXXXXXXX">
            </div>
        </div>
        <button type="button" onclick="analyzeStatus()">تحليل الحالة العامة</button>
        <button type="button" class="btn-whatsapp" onclick="sendToWhatsApp()">📲 إرسال التقرير للطبيب</button>
        <button type="button" class="btn-emergency" onclick="sendSOS()">🚨 إرسال استغاثة طوارئ (SOS)</button>
        <button type="button" class="btn-pharmacy" onclick="openPharmacyLink()">🔍 الانتقال لدليل صيدليات ميسان</button>
        <div id="statusResult" class="result-box"></div>
    </div>

    <div class="card">
        <h3>💉 تسجيل قراءة وحساب الجرعة</h3>
        <div class="profile-grid">
            <div class="input-group full-width">
                <label>إضافة سريعة (أكلات عراقية)</label>
                <select id="foodAssistant" onchange="addFoodCarbs()">
                    <option value="0">--- اختر نوع الطعام ---</option>
                    <option value="15">صمونة حجرية واحدة (15 جرام)</option>
                    <option value="30">خبز عراقي (30 جرام)</option>
                    <option value="45">صحن تمن متوسط (45 جرام)</option>
                    <option value="12">قطعة كبة برغل (12 جرام)</option>
                    <option value="50">لفة فلافل (50 جرام)</option>
                </select>
            </div>
            <div class="input-group">
                <label>السكر الحالي (mg/dL)</label>
                <input type="number" id="currSugar" placeholder="200">
            </div>
            <div class="input-group">
                <label>الكاربوهيدرات (جرام)</label>
                <input type="number" id="carbs" placeholder="50">
            </div>
        </div>
        <button type="button" onclick="calculateAndLog()">احسب الجرعة وسجل القراءة</button>
        <div id="doseResult" class="result-box"></div>
    </div>

    <div class="card">
        <h3>📜 سجل القراءات اليومي</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>الوقت</th>
                        <th>السكر</th>
                        <th>الكارب</th>
                        <th>الجرعة</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
        <button type="button" onclick="clearLogs()" style="background: #333; color: #ff4444; margin-top: 15px;">مسح السجل بالكامل</button>
        <a href="https://www.instagram.com/diacode.iq?igsh=MWhjazFyeGlvenhkZA==" target="_blank" class="insta-btn">الانستكرام</a>
    </div>

    <footer class="app-footer">
        <p>تم التطوير بواسطة المهندس <span>علي أحمد عبد الحسين زركي</span> © 2026</p>
        <p style="color: #444;">الصدقة الجارية - عن روح والدتي</p>
    </footer>
</div>

<script>
    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('PWA Ready'))
            .catch(err => console.log('PWA Failed'));
        });
    }

    const PHARMACY_LINK = "https://aliahmed-d.github.io/DiaCode/"; 

    function openPharmacyLink() {
        window.open(PHARMACY_LINK, "_blank");
    }

    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5;
            this.speedX = Math.random() * 0.3 - 0.15;
            this.speedY = Math.random() * 0.3 - 0.15;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0; else if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0; else if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.fillStyle = 'rgba(0, 255, 136, 0.2)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }
    for (let i = 0; i < 50; i++) particles.push(new Particle());
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    let logs = JSON.parse(localStorage.getItem('diaLogs')) || [];

    function updateTable() {
        const body = document.getElementById('logBody');
        if(!body) return;
        body.innerHTML = logs.map(log => `<tr><td>${log.time}</td><td>${log.sugar}</td><td>${log.carbs}</td><td>${log.dose}</td></tr>`).join('');
        localStorage.setItem('diaLogs', JSON.stringify(logs));
    }

    function addFoodCarbs() {
        const val = document.getElementById('foodAssistant').value;
        if (val > 0) document.getElementById('carbs').value = val;
    }

    function analyzeStatus() {
        const h = document.getElementById('hba1c').value;
        const res = document.getElementById('statusResult');
        if(!h) { alert("يرجى إدخال التراكمي"); return; }
        res.style.display = "block";
        res.innerHTML = h > 7 ? "⚠️ التراكمي مرتفع، راقب أكلك" : "✅ وضعك مستقر حالياً";
    }

    function calculateAndLog() {
        const s = document.getElementById('currSugar').value;
        const c = document.getElementById('carbs').value;
        if (!s || !c) { alert("أكمل بيانات السكر والكارب"); return; }
        const dose = (c / 15).toFixed(1);
        const time = new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
        logs.push({ time, sugar: s, carbs: c, dose });
        const resBox = document.getElementById('doseResult');
        resBox.style.display = "block";
        resBox.innerHTML = `💉 الجرعة المقترحة: ${dose} وحدة`;
        updateTable();
    }

    function formatNumber(p) {
        let num = p.trim();
        if (num.startsWith('07')) return '964' + num.substring(1);
        return num;
    }

    function sendToWhatsApp() {
        const p = document.getElementById('docPhone').value;
        if (!p) { alert("أدخل رقم الطبيب"); return; }
        const num = formatNumber(p);
        const name = document.getElementById('patientName').value || 'غير مسجل';
        const msg = `*تقرير DiaCode*%0Aالمريض: ${name}%0Aالتراكمي: ${document.getElementById('hba1c').value || '---'}%0Aآخر سكر: ${document.getElementById('currSugar').value || '---'}`;
        window.open(`https://wa.me/${num}?text=${msg}`, '_blank');
    }

    function sendSOS() {
        const p = document.getElementById('docPhone').value;
        const name = document.getElementById('patientName').value || "مريض سكري";
        
        if (!p) { 
            alert("يرجى إدخال رقم الطوارئ في حقل رقم الطبيب أولاً"); 
            return; 
        }
        
        if (confirm("هل أنت متأكد من إرسال نداء استغاثة فوري؟")) {
            const num = formatNumber(p);
            const sosMsg = `*🚨 نداء استغاثة SOS فوري*%0Aالمريض: *${name}*%0Aالحالة: بحاجة لمساعدة عاجلة!`;
            const waUrl = `https://wa.me/${num}?text=${sosMsg}`;
            
            const win = window.open(waUrl, '_blank');
            if (win) {
                win.focus();
            } else {
                location.href = waUrl;
            }
        }
    }

    function clearLogs() {
        if (confirm("هل تريد مسح السجل؟")) { logs = []; updateTable(); }
    }

    updateTable();
</script>
</body>
</html>
