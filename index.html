<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiaCode v2.0 - Pro System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>DiaCode <span>v2.0</span></h1>
        <p>نظام ذكي لمتابعة السكر في الدم</p>
    </header>

    <div class="card">
        <h3>👤 الملف الطبي للمريض</h3>
        <div class="profile-grid">
            <div class="input-group full-width">
                <label>الاسم الكامل</label>
                <input type="text" id="patientName" placeholder="علي أحمد...">
            </div>
            <div class="input-group">
                <label>السكر التراكمي (HbA1c)</label>
                <input type="number" id="hba1c" step="0.1" placeholder="6">
            </div>
            <div class="input-group">
                <label>الوزن (كجم)</label>
                <input type="number" id="weight" placeholder="80">
            </div>
            <div class="input-group full-width">
                <label>رقم واتساب الطبيب (مثال: 9647XXXXXXXX)</label>
                <input type="text" id="docPhone" placeholder="9647726512076">
            </div>
        </div>
        <button onclick="analyzeStatus()">تحليل الحالة العامة</button>
        <button class="btn-whatsapp" onclick="sendToWhatsApp()">📲 إرسال التقرير للطبيب</button>
        <div id="statusResult" class="result-box"></div>
    </div>

    <div class="card">
        <h3>💉 تسجيل قراءة وحساب الجرعة</h3>
        <div class="profile-grid">
            <div class="input-group">
                <label>السكر الحالي (mg/dL)</label>
                <input type="number" id="currSugar" placeholder="200">
            </div>
            <div class="input-group">
                <label>الكاربوهيدرات (جرام)</label>
                <input type="number" id="carbs" placeholder="50">
            </div>
            <div class="input-group">
                <label>معامل الكارب (ICR)</label>
                <input type="number" id="icr" value="15">
            </div>
        </div>
        <button onclick="calculateAndLog()">احسب الجرعة وسجل القراءة</button>
        <div id="doseResult" class="result-box"></div>
    </div>

    <div class="card">
        <h3>📜 سجل القراءات اليومي</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>الوقت</th>
                        <th>السكر</th>
                        <th>الكارب</th>
                        <th>الجرعة</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
        <button onclick="clearLogs()" class="btn-clear">مسح السجل بالكامل</button>
    </div>
</div>

<footer class="app-footer">
    <p>تم التطوير بواسطة المهندس <span>علي أحمد عبد الحسين زركي</span> &copy; 2026</p>
    <p class="dedication">صدقة جارية عن روح والدتي ولشهداء العراق الأبرار - نسألكم قراءة الفاتحة</p>
</footer>

<script src="script.js"></script>
</body>
</html>
