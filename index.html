<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiaCode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>DiaCode</h1>

        <div class="card">
            <h3>👤 الملف الطبي للمريض</h3>
            <div class="profile-grid">
                <div class="input-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="patientName">
                </div>
                <div class="input-group">
                    <label>السكر التراكمي (HbA1c)</label>
                    <input type="number" id="hba1c" step="0.1">
                </div>
                <div class="input-group">
                    <label>تاريخ آخر فحص</label>
                    <input type="date" id="lastTest">
                </div>
                <div class="input-group">
                    <label>العمر</label>
                    <input type="number" id="age">
                </div>
            </div>
        </div>

        <div class="card">
            <h3>💉 تسجيل القراءة اليومية</h3>
            <div class="profile-grid">
                <div class="input-group">
                    <label>السكر الحالي</label>
                    <input type="number" id="currSugar">
                </div>
                <div class="input-group">
                    <label>الكربوهيدرات (غرام)</label>
                    <input type="number" id="carbs">
                </div>
            </div>
            <button onclick="calculateAndLog()" class="btn-main">حساب وتسجيل الجرعة</button>
        </div>

        <div class="card">
            <h3>📊 سجل التقارير اليومية</h3>
            <div class="table-wrapper">
                <table id="logTable">
                    <thead>
                        <tr>
                            <th>الوقت</th>
                            <th>السكر</th>
                            <th>الكارب</th>
                            <th>الجرعة</th>
                        </tr>
                    </thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
            <button onclick="sendDoctorReport()" class="btn-outline">إرسال التقرير الشامل للطبيب 📧</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
